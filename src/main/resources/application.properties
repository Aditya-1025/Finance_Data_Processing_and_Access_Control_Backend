# ==========================================
# Application Properties
# ==========================================
spring.application.name=finance-backend
server.port=8081

# ==========================================
# H2 Database (file-mode — data is persisted)
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/financedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# H2 Console (dev convenience)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=3E5A7C8D2F4B6A1C9E3F5B7D0A2C4E6F8B0D2F4A6C8E0A2C4E6F8A0C2E4F6B8D
app.jwt.expiration-ms=86400000

# ==========================================
# Data Initialization
# ==========================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==========================================
# Logging
# ==========================================
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN

# ==========================================
# SpringDoc / Swagger
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
